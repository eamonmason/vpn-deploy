# Secret rotation registry — consumed by .github/workflows/rotate-secrets.yml
#
# GitHub does NOT provide an API to rotate user-level PATs (classic or fine-grained).
# This config tracks manually-managed secrets so the workflow can surface a GitHub
# issue ahead of expiry. Update `expires` here whenever you rotate the underlying
# token in GitHub's settings UI.
#
# AWS Secrets Manager entries are auto-rotated on schedule (no expiry tracking needed).

manual_secrets:
  - name: "Claude Code (GitHub classic PAT)"
    description: "GitHub PAT used by the Claude Code CLI in the ttyd container for git auth"
    # ISO date the token expires. Update after each manual rotation.
    expires: "2027-01-15"
    warn_days: 30
    rotation_url: "https://github.com/settings/tokens"
    rotation_steps:
      - "Visit https://github.com/settings/tokens and regenerate the 'Claude Code' PAT"
      - "Update wherever the token is consumed (k8s claude-code-secrets, gh CLI config, etc.)"
      - "Update the `expires` field in this file with the new expiry date"

  - name: "CLAUDE_CODE_OAUTH_TOKEN (Anthropic)"
    description: "Anthropic OAuth token for the Claude Code GitHub Action (claude setup-token)"
    # The Anthropic token expiry is not surfaced via API; track manually.
    expires: "2026-12-01"
    warn_days: 30
    rotation_url: "Run `claude setup-token` locally"
    rotation_steps:
      - "Run `claude setup-token` on a machine logged in to your Claude Pro/Max account"
      - "Update CLAUDE_CODE_OAUTH_TOKEN in this repo's GitHub Secrets"
      - "Update the `expires` field in this file"

aws_secrets_manager:
  - secret_name: vpn-starter-proxy-api-key
    description: "VPN Starter Proxy Lambda API key (auto-rotated by Secrets Manager every 30 days)"
    # Rotation is driven by the schedule on the secret itself; this entry is informational.
