name: Secret Rotation Monitor

# Warns about upcoming expiries for manually-managed secrets (PATs, OAuth tokens, etc.).

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: '0 9 * * MON'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  warn-on-manual-secrets:
    name: Open issue for secrets nearing expiry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check expiry dates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from datetime import datetime, timezone, date
          import yaml

          with open(".github/secret-rotation.yml") as f:
              config = yaml.safe_load(f)

          repo = os.environ["REPO"]
          today = date.today()
          warnings = []

          for entry in config.get("manual_secrets", []):
              expires = entry["expires"]
              expiry_date = datetime.strptime(expires, "%Y-%m-%d").date()
              days_left = (expiry_date - today).days
              warn_days = entry.get("warn_days", 30)

              if days_left <= warn_days:
                  warnings.append({**entry, "days_left": days_left})

          if not warnings:
              print("All tracked secrets have >warn_days remaining. Nothing to do.")
              sys.exit(0)

          # Build issue body
          lines = ["## Secrets approaching expiry\n",
                   f"_Generated by `.github/workflows/rotate-secrets.yml` on {today}._\n"]
          for w in warnings:
              urgency = "EXPIRED" if w["days_left"] < 0 else f"{w['days_left']} days remaining"
              lines.append(f"### {w['name']} — **{urgency}**")
              lines.append(f"_{w['description']}_\n")
              lines.append(f"- **Expires:** {w['expires']}")
              lines.append(f"- **Rotation URL:** {w['rotation_url']}")
              lines.append("- **Steps:**")
              for step in w.get("rotation_steps", []):
                  lines.append(f"  1. {step}")
              lines.append("")
          body = "\n".join(lines)
          title = f"Secrets approaching expiry ({len(warnings)})"

          # Find existing open issue with the rotation label
          existing = json.loads(subprocess.check_output(
              ["gh", "issue", "list", "--repo", repo,
               "--label", "secret-rotation", "--state", "open",
               "--json", "number,title"]
          ))

          if existing:
              num = existing[0]["number"]
              subprocess.run(
                  ["gh", "issue", "edit", str(num), "--repo", repo,
                   "--title", title, "--body", body],
                  check=True
              )
              print(f"Updated issue #{num}")
          else:
              # Ensure label exists (idempotent)
              subprocess.run(
                  ["gh", "label", "create", "secret-rotation",
                   "--repo", repo, "--color", "fbca04",
                   "--description", "Secret nearing expiry"],
                  check=False
              )
              subprocess.run(
                  ["gh", "issue", "create", "--repo", repo,
                   "--title", title, "--body", body,
                   "--label", "secret-rotation"],
                  check=True
              )
              print("Created new issue")
          PYEOF

